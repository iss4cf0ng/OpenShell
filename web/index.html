<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OpenShell Console</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css">

<style>

body{
    margin:0;
    background:#1e1e1e;
    color:white;
    font-family:Arial;
}

#container{
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* session list */

#sessions{
    height:200px;
    overflow:auto;
    border-bottom:1px solid #333;
}

#sessions table{
    width:100%;
    border-collapse:collapse;
}

#sessions th,#sessions td{
    padding:6px;
    border:1px solid #444;
    text-align:left;
}

#sessions th{
    background:#2a2a2a;
}

/* splitter */

#splitter{
    height:5px;
    background:#555;
    cursor:row-resize;
}

/* terminal area */

#terminalContainer{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* tabs */

#tabs{
    height:32px;
    display:flex;
    background:#222;
    border-bottom:1px solid #333;
}

.tab{
    display:flex;
    align-items:center;
    padding:6px 10px;
    cursor:pointer;
    border-right:1px solid #333;
    background:#222;
}

.tab.active{
    background:#444;
}

.tab-close{
    margin-left:8px;
    color:#aaa;
    cursor:pointer;
}

.tab-close:hover{
    color:white;
}

/* terminal */

#terminalArea{
    flex:1;
    position:relative;
}

.terminal{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
}

</style>

</head>

<body>

<div id="container">

<div id="sessions">
<h3>Sessions</h3>

<table id="sessionTable">
<tr>
<th>ID</th>
<th>IP</th>
<th>Type</th>
</tr>
</table>

</div>

<div id="splitter"></div>

<div id="terminalContainer">

<div id="tabs"></div>

<div id="terminalArea"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
<script src="ui.js"></script>

</body>
</html>
