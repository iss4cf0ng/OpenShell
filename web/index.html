<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OpenShell</title>

<link rel="stylesheet" href="https://unpkg.com/@xterm/xterm/css/xterm.css">

<style>
body{
    margin:0;
    background:#1e1e1e;
    color:white;
    font-family:Arial;
}
#container{
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* builder */
#builderMenu{
    display:flex;
    background:#222;
    padding:4px;
    border-bottom:1px solid #333;
}
#builderMenu button{
    margin-right:4px;
    background:#333;
    color:white;
    border:none;
    padding:4px 8px;
    cursor:pointer;
}
#builderMenu button:hover{ background:#555; }
#payloadbox{
    flex:1;
    margin-left:8px;
    background:#111;
    color:white;
    border:none;
    padding:4px;
}

/* session list */
#sessions{
    height:200px;
    overflow:auto;
    border-bottom:1px solid #333;
}
#sessions table{
    width:100%;
    border-collapse:collapse;
}
#sessions th,#sessions td{
    padding:6px;
    border:1px solid #444;
    text-align:left;
}
#sessions th{
    background:#2a2a2a;
}

/* splitter */
#splitter{
    height:5px;
    background:#555;
    cursor:row-resize;
}

/* terminal area */
#terminalContainer{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* tabs */
#tabs{
    height:32px;
    display:flex;
    background:#222;
    border-bottom:1px solid #333;
}
.tab{
    display:flex;
    align-items:center;
    padding:6px 10px;
    cursor:pointer;
    border-right:1px solid #333;
    background:#222;
}
.tab.active{ background:#444; }
.tab-close{
    margin-left:8px;
    color:#aaa;
    cursor:pointer;
}
.tab-close:hover{ color:white; }

/* terminal */
#terminalArea{
    flex:1;
    position:relative;
}
.terminal{
    position:absolute;
    top:0; left:0; right:0; bottom:0;
}

/* status bar */
#statusBar{
    height:24px;
    background:#222;
    border-top:1px solid #333;
    display:flex;
    align-items:center;
    padding:0 8px;
}

/* login panel */
#loginPanel{
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.8);
}
#loginPanel input{
    padding:4px;
    margin-right:4px;
}

.builder-btn {
  width: 80px;
  height: 30px;
  font-size: 13px;
  cursor: pointer;
}

.builder-dialog {
  background: #3a3a3a;
  color: white;
  border-radius: 6px;
  border: none;
  padding: 20px;
}

.builder-dialog input,
.builder-dialog select {
  width: 180px;
  padding: 4px;
}

/* command box */
#shellOutput {
  margin-top: 12px;
  background: #1e1e1e;
  padding: 10px;
  border-radius: 4px;

  width: 350px;
  height: 80px;

  overflow-y: auto;
  overflow-x: auto;

  font-family: monospace;
  font-size: 13px;
}

</style>
</head>
<body>

<div id="container">

    <!-- Builder menu -->
    <button id="builderBtn" class="builder-btn">Builder</button>

    <dialog id="builderDialog" class="builder-dialog">
    <h3>Reverse Shell Builder</h3>

    <label>Script</label><br>
    <select id="builderScript">
        <option value="bash">bash</option>
        <option value="sh">sh</option>
        <option value="openssl">openssl</option>
        <option value="python">python</option>
        <option value="nc">netcat</option>
        <option value="php">php</option>
        <option value="perl">perl</option>
        <option value="ruby">ruby</option>
        <option value="powershell">powershell</option>
    </select>

    <br><br>

    <label>IP</label><br>
    <input id="builderIp" type="text" placeholder="127.0.0.1">

    <br><br>

    <label>Port</label><br>
    <input id="builderPort" type="number" placeholder="4444">

    <br><br>

    <button id="createShell">Create</button>
    <button id="copyShell">Copy</button>
    <button id="closeBuilder">Close</button>

    <div id="shellOutput"></div>
    </dialog>

    <!-- Session list -->
    <div id="sessions">
        <h3>Sessions</h3>
        <table id="sessionTable">
            <tr><th>ID</th><th>IP</th><th>Type</th></tr>
        </table>
    </div>

    <div id="splitter"></div>

    <div id="terminalContainer">
        <div id="tabs"></div>
        <div id="terminalArea"></div>
    </div>

    <!-- Status bar -->
    <div id="statusBar">
        Online Machines: <span id="online">0</span>
    </div>

</div>

<!-- Login panel -->
<div id="loginPanel" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background-color:black;">
  <div style="text-align:center; width:400px; color:white; font-family:sans-serif;">
    
    <!-- Logo -->
    <img src="https://iss4cf0ng.github.io/images/meme/natsu_cake.jpg" width="200">
    
    <!-- Tool info -->
    <div style="margin-bottom:20px;">
      <h2 style="margin:0;">OpenShell</h2>
      <p style="margin:10px 0; font-size:18px;">Author: <a href="https://github.com/iss4cf0ng/" target="_blank" style="color:#00bfff; text-decoration:none;">ISSAC</a></p>
      <a href="https://github.com/iss4cf0ng/OpenShell" target="_blank" style="color:#00bfff; text-decoration:none;">GitHub Repository</a>
    </div>
    
    <!-- Password input -->
    <input id="password" type="password" placeholder="Password"
      style="width:92%; padding:15px; font-size:18px; background-color:#111; color:white; border:none; border-radius:5px; margin-bottom:20px;">

    <!-- Login button -->
    <button onclick="login()"
      style="width:100%; padding:15px; font-size:18px; background-color:#111; color:white; border:none; border-radius:5px; cursor:pointer;">
      Login
    </button>

  </div>
</div>

<script src="https://unpkg.com/@xterm/xterm/lib/xterm.js"></script>
<script src="https://unpkg.com/@xterm/addon-fit/lib/addon-fit.js"></script>
<script src="/ui.js"></script>
</body>
</html>
